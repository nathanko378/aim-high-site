<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aim High Tutoring</title>
  <link rel="icon" type="image/png" href="assets/logo.png">
  <link rel="apple-touch-icon" href="assets/logo.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="styles.css?v=10">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html" aria-label="Aim High Tutoring home">
      <img class="brand-logo" src="assets/logo.png" alt="">
      <span>Aim High Tutoring</span>
    </a>

    <nav class="nav-links" aria-label="Main navigation">
      <a href="who-we-are.html">Who We Are</a>
      <div class="dropdown-wrap">
        <button class="button button-small" type="button" data-open-form>Get Started</button>
        <div class="dropdown-form" data-form-panel>
          <form class="lead-form">
            <label>
              Name
              <input type="text" name="name" autocomplete="name" required>
            </label>
            <label>
              Phone Number
              <input type="tel" name="phone" autocomplete="tel" required>
            </label>
            <button class="button" type="submit">Submit</button>
          </form>
          <p class="form-message" role="status" aria-live="polite"></p>
        </div>
      </div>
    </nav>
  </header>

  <main>
    <section class="hero">
      <div class="feature-pill pill-pink">Personalized lessons</div>
      <div class="feature-pill pill-green">Proven results</div>
      <div class="feature-pill pill-blue">High-impact tutoring</div>
      <div class="feature-pill pill-orange">Flexible scheduling</div>
      <div class="feature-pill pill-teal">Grades 7-12</div>
      <div class="feature-pill pill-purple">Peer-to-Peer Learning</div>

      <div class="hero-content">
        <img class="hero-icon" src="assets/logo.png" alt="">
        <h1>Aim High <span>Tutoring</span></h1>
        <p class="hero-copy">
          Helping students excel in math through personalized,<br>
          high-impact tutoring.
        </p>
        <div class="hero-actions">
          <div class="dropdown-wrap hero-dropdown">
            <button class="button button-large button-black" type="button" data-open-form>Get Started</button>
            <div class="dropdown-form" data-form-panel>
              <form class="lead-form">
                <label>
                  Name
                  <input type="text" name="name" autocomplete="name" required>
                </label>
                <label>
                  Phone Number
                  <input type="tel" name="phone" autocomplete="tel" required>
                </label>
                <button class="button button-black" type="submit">Submit</button>
              </form>
              <p class="form-message" role="status" aria-live="polite"></p>
            </div>
          </div>
          <a class="button button-large button-outline" href="who-we-are.html">Who We Are</a>
        </div>
        <div class="social-links" aria-label="Social media links">
          <a href="https://www.linkedin.com/company/aim-high-tutoringca" target="_blank" rel="noopener noreferrer" aria-label="Aim High Tutoring on LinkedIn">
            <i class="fa-brands fa-linkedin" aria-hidden="true"></i>
          </a>
          <a href="https://www.instagram.com/aimhigh.tutoring/" target="_blank" rel="noopener noreferrer" aria-label="Aim High Tutoring on Instagram">
            <i class="fa-brands fa-instagram" aria-hidden="true"></i>
          </a>
        </div>
      </div>
    </section>

  </main>

  <script src="script.js?v=5"></script>
</body>
</html>
