<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Who We Are | Aim High Tutoring</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html" aria-label="Aim High Tutoring home">
      <img class="brand-logo" src="assets/logo.png" alt="">
      <span>Aim High Tutoring</span>
    </a>

    <nav class="nav-links" aria-label="Main navigation">
      <a href="who-we-are.html" aria-current="page">Who We Are</a>
      <a href="our-philosophy.html">Our Philosophy</a>
      <div class="dropdown-wrap">
        <button class="button button-small" type="button" data-open-form>Get Started</button>
        <div class="dropdown-form" data-form-panel>
          <form class="lead-form">
            <label>Name<input type="text" name="name" autocomplete="name" required></label>
            <label>Phone Number<input type="tel" name="phone" autocomplete="tel" required></label>
            <button class="button" type="submit">Submit</button>
          </form>
          <p class="form-message" role="status" aria-live="polite"></p>
        </div>
      </div>
    </nav>
  </header>

  <main class="page-main">
    <section class="page-hero">
      <p class="eyebrow">Who We Are</p>
      <h1>Math tutors focused on student success.</h1>
      <p>We help students build skill, confidence, and stronger results.</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
